name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - run: uv python install 3.11
      - run: uv sync --frozen --extra dev --extra server --extra browser --python 3.11
      - run: uv run ruff check src/ tests/ examples/ scripts/ maintenance/
      - run: uv run ruff format --check src/ tests/ examples/ scripts/ maintenance/
      - run: uv run ty check src/cayu examples maintenance
      - run: uv run python scripts/generate_sidecar_manifest.py --check
      - run: uv lock --check

  test:
    name: Test (Python 3.14)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CAYU_REQUIRE_POSTGRES: "1"
      CAYU_REQUIRE_DOCKER_RUNNER: "1"
      CAYU_REQUIRE_DOCKER_EGRESS: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - run: uv python install 3.14
      - run: uv sync --frozen --extra dev --extra server --python 3.14
      - name: Test
        if: github.event_name == 'pull_request'
        run: uv run pytest -q --durations=20
      - name: Test with coverage visibility
        if: github.event_name != 'pull_request'
        run: |
          uv run pytest -q \
            --durations=20 \
            --cov=cayu \
            --cov-branch \
            --cov-report=term-missing:skip-covered \
            --cov-report=markdown-append:${GITHUB_STEP_SUMMARY}

  sqlite-cancellation:
    name: SQLite cancellation (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --frozen --extra dev --extra server --python ${{ matrix.python-version }}
      - name: Exercise cancellation ownership repeatedly
        run: |
          for attempt in 1 2 3; do
            uv run pytest -q \
              tests/core/test_sqlite_session_store.py::test_sqlite_off_thread_writer_retains_connection_ownership_during_cancellation \
              tests/core/test_sqlite_session_store.py::test_sqlite_pending_cancellation_retains_off_thread_connection_ownership \
              tests/core/test_sqlite_session_store.py::test_sqlite_task_sweep_cannot_end_off_thread_connection_ownership \
              tests/core/test_sqlite_session_store.py::test_sqlite_off_thread_reader_retains_connection_ownership_during_cancellation \
              tests/core/test_sqlite_session_store.py::test_sqlite_off_thread_worker_failure_and_cancellation_remain_observable \
              tests/core/test_sqlite_session_store.py::test_sqlite_in_memory_read_cancellation_serializes_shared_writer_connection \
              tests/core/test_runtime.py::test_cancelled_sqlite_factory_checkpoint_preserves_committed_allocation
          done

  package:
    name: Release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      prerelease: ${{ steps.release-version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - run: uv python install 3.11
      # PR and main CI must be deterministic. Freshness is wall-clock policy enforced by
      # scheduled maintenance and release-tag validation; this check validates the committed
      # artifact without making an unchanged branch fail as time passes.
      - run: uv run python -m maintenance.model_catalog.check --skip-staleness
      - name: Enforce freshness for release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        run: uv run python -m maintenance.model_catalog.check
      - name: Check tag matches project version
        id: release-version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          uv run --group nightly python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          from packaging.version import Version

          with Path("pyproject.toml").open("rb") as pyproject:
              version = tomllib.load(pyproject)["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          if tag != f"v{version}":
              raise SystemExit(
                  f"tag {tag} does not match pyproject.toml version {version}"
              )
          with Path(os.environ["GITHUB_OUTPUT"]).open("a") as output:
              print(
                  f"prerelease={str(Version(version).is_prerelease).lower()}",
                  file=output,
              )
          PY
      - run: uv build --out-dir dist/first
      - run: uv build --out-dir dist/second
      - name: Check reproducible archives
        run: |
          cmp dist/first/*.tar.gz dist/second/*.tar.gz
          cmp dist/first/*.whl dist/second/*.whl
      - run: uv run python scripts/check_release_artifacts.py dist/first/*
      - run: uv venv --python 3.11 .release-venv
      - run: uv pip install --python .release-venv/bin/python dist/first/*.whl
      - name: Check bundled model catalog and price book from the installed wheel
        run: |
          .release-venv/bin/python - <<'PY'
          import cayu

          catalog = cayu.default_model_catalog()
          price_book = cayu.default_price_book()
          assert cayu.__name__ == "cayu"
          assert catalog.models
          assert price_book.prices
          for model in catalog.models:
              assert catalog.match(
                  provider_name=model.provider_name,
                  model=model.model,
              ) == model
              for prefix in model.match_prefixes:
                  assert catalog.resolve(
                      provider_name=model.provider_name,
                      model=f"{prefix}fixture",
                  ) == model
          PY
      # The AWS Lambda MicroVM base image is published for ARM64 only. Register
      # emulation so the amd64 GitHub runner can verify the exact exported image.
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          platforms: arm64
      - name: Verify installed wheel and source-distribution sidecar exports
        run: |
          uv venv --python 3.11 .release-sdist-venv
          uv pip install --python .release-sdist-venv/bin/python dist/first/*.tar.gz
          proof_root="$(mktemp -d)"
          cd "$proof_root"
          unset PYTHONPATH
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" \
            lambda-microvm sidecar export "$proof_root/wheel"
          "$GITHUB_WORKSPACE/.release-sdist-venv/bin/cayu" \
            lambda-microvm sidecar export "$proof_root/sdist"
          diff -ru "$proof_root/wheel" "$proof_root/sdist"
          "$GITHUB_WORKSPACE/.release-venv/bin/python" - <<'PY'
          import hashlib
          import importlib.metadata
          import importlib.util
          import json
          from pathlib import Path

          from cayu.runners.aws_lambda_microvm import LAMBDA_MICROVM_PROTOCOL_VERSION

          root = Path("wheel")
          manifest = json.loads(
              (root / "cayu-lambda-microvm-sidecar-manifest.json").read_text()
          )
          assert manifest["schema_version"] == 1
          assert manifest["artifact_version"] == 1
          assert manifest["cayu_version"] == importlib.metadata.version("cayu")
          assert manifest["protocol_version"] == LAMBDA_MICROVM_PROTOCOL_VERSION
          expected_paths = {
              "cayu-lambda-microvm-sidecar-manifest.json",
              *(item["path"] for item in manifest["files"]),
          }
          assert {
              path.relative_to(root).as_posix()
              for path in root.rglob("*")
              if path.is_file()
          } == expected_paths
          for item in manifest["files"]:
              content = (root / item["path"]).read_bytes()
              assert len(content) == item["size"]
              assert "sha256:" + hashlib.sha256(content).hexdigest() == item["sha256"]
          canonical_files = json.dumps(
              manifest["files"],
              ensure_ascii=False,
              sort_keys=True,
              separators=(",", ":"),
          ).encode()
          assert (
              "sha256:" + hashlib.sha256(canonical_files).hexdigest()
              == manifest["content_digest"]
          )
          assert importlib.util.find_spec("boto3") is None
          assert importlib.util.find_spec("fastapi") is None
          PY
          docker build --platform linux/arm64 \
            -t cayu-lambda-microvm-sidecar-proof "$proof_root/wheel"
          docker run --rm --platform linux/arm64 --entrypoint python3.11 \
            cayu-lambda-microvm-sidecar-proof -c \
            'import asyncio; from lambda_microvm_sidecar.app import health; result = asyncio.run(health()); assert result == {"status": "ok", "protocol_version": "1"}'
          "$GITHUB_WORKSPACE/.release-sdist-venv/bin/python" - <<'PY'
          from importlib.resources import files

          resource = files("cayu.data").joinpath("lambda_microvm_sidecar", "app.py")
          resource.write_bytes(resource.read_bytes() + b"\n# tampered\n")
          PY
          if "$GITHUB_WORKSPACE/.release-sdist-venv/bin/cayu" \
            lambda-microvm sidecar export "$proof_root/tampered"; then
            echo "tampered installed sidecar unexpectedly exported"
            exit 1
          fi
      - name: Check built-wheel authoring contract
        run: |
          uv pip install --python .release-venv/bin/python pytest
          .release-venv/bin/python -m cayu version
          project_root="$(mktemp -d)"
          .release-venv/bin/cayu new proof --dir "$project_root"
          cd "$project_root/proof"
          "$GITHUB_WORKSPACE/.release-venv/bin/python" run.py --help >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" guide anatomy >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" guide authoring >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" guide tool-effects >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/python" -c 'from cayu.testing import verify_tool_effect'
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" inspect --json >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" check --json >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/python" - <<'PY'
          import run
          from app import build_app
          from cayu import ModelStreamEvent, ScriptedModelProvider

          provider = ScriptedModelProvider([
              ModelStreamEvent.text_delta("ready"),
              ModelStreamEvent.completed({"finish_reason": "stop"}),
          ])
          run.build_app = lambda **_kwargs: build_app(provider=provider)
          assert run.main(["--message", "Run the agent."]) == 0
          PY
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" generate slice reviewer --tool assess_submission --effect none
          "$GITHUB_WORKSPACE/.release-venv/bin/python" - <<'PY'
          import run
          from app import build_app
          from cayu import ModelStreamEvent, ScriptedModelProvider

          provider = ScriptedModelProvider([
              ModelStreamEvent.text_delta("reviewed"),
              ModelStreamEvent.completed({"finish_reason": "stop"}),
          ])
          run.build_app = lambda **_kwargs: build_app(provider=provider)
          assert run.main([
              "--agent", "reviewer", "--message", "Review the change."
          ]) == 0
          assert len(provider.requests) == 1
          PY
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" generate slice reviewer --tool assess_submission --effect none --json > repeated-plan.json
          "$GITHUB_WORKSPACE/.release-venv/bin/python" - <<'PY'
          import json
          from pathlib import Path

          from cayu.runtime import APP_MANIFEST_SCHEMA_VERSION

          repeated = json.loads(Path("repeated-plan.json").read_text())
          assert repeated["schema_version"] == APP_MANIFEST_SCHEMA_VERSION
          assert repeated["status"] == "already_present"
          assert repeated["edits"] == []

          agent = Path("agents/reviewer.py")
          source = agent.read_text()
          source = source.replace(
              "when it directly answers the user's request",
              "to assess the submitted proposal against the domain rubric",
          )
          agent.write_text(source)
          PY
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" inspect --agent reviewer --json > unfinished-inspect.json
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" check --json > unfinished-check.json
          "$GITHUB_WORKSPACE/.release-venv/bin/python" - <<'PY'
          import json
          from pathlib import Path

          from cayu.runtime import APP_MANIFEST_SCHEMA_VERSION

          inspect = json.loads(Path("unfinished-inspect.json").read_text())
          assert inspect["schema_version"] == APP_MANIFEST_SCHEMA_VERSION
          assert inspect["agents"][0]["authoring_state"] == (
              "unfinished_generated_tracer_bullet"
          )
          check = json.loads(Path("unfinished-check.json").read_text())
          assert [item["code"] for item in check["diagnostics"]] == [
              "AGENT_GENERATED_TRACER_BULLET_UNFINISHED"
          ]
          PY
          if "$GITHUB_WORKSPACE/.release-venv/bin/cayu" check --fail-on warning --json > warning-gate.json; then
            echo "unfinished generated slice unexpectedly passed the warning gate"
            exit 1
          fi
          "$GITHUB_WORKSPACE/.release-venv/bin/python" -m pytest -q
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" eval run >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" eval run evals.reviewer:build_eval >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/python" - <<'PY'
          from pathlib import Path

          path = Path("agents/reviewer.py")
          source = path.read_text()
          marker = (
              "    authoring_state="
              "AgentAuthoringState.UNFINISHED_GENERATED_TRACER_BULLET,\n"
          )
          assert marker in source
          source = source.replace("AgentAuthoringState, ", "").replace(marker, "")
          source += "\n# Completed source may still mention sample, echo, or tracer bullet.\n"
          path.write_text(source)
          PY
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" check --fail-on warning --json > completed-check.json
          "$GITHUB_WORKSPACE/.release-venv/bin/python" - <<'PY'
          import json
          from pathlib import Path

          check = json.loads(Path("completed-check.json").read_text())
          assert check["diagnostics"] == []
          PY
      - run: .release-venv/bin/cayu console --help
      - name: Check optional console dependency guidance
        run: |
          if output="$(.release-venv/bin/cayu console cayu.runtime.app:CayuApp 2>&1)"; then
            echo "console unexpectedly started without the console extra"
            exit 1
          fi
          test "$output" = 'error: Cayu console requires IPython. Install it with: pip install "cayu[console]"'
      - name: Check installed CLI version
        run: |
          expected_version="$(.release-venv/bin/python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$(.release-venv/bin/cayu version)" = "cayu ${expected_version}"
      # Publishing consumes these exact bytes: the artifact uploaded here is the
      # dist/first build that every check above validated. The publish job must
      # never rebuild.
      - name: Upload release distribution
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-dist
          path: dist/first/
          if-no-files-found: error

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run typecheck
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - run: uv python install 3.11
        working-directory: .
      - run: uv sync --frozen --extra dev --extra server --python 3.11
        working-directory: .
      - run: npm run check:api
      - run: npm run build:package
      - name: Check packaged dashboard assets
        run: |
          status="$(git -C .. status --porcelain -- src/cayu/server/dashboard)"
          if test -n "$status"; then
            echo "$status"
            git -C .. diff --stat -- src/cayu/server/dashboard
            exit 1
          fi

  # Publishes to PyPI via Trusted Publishing (OIDC). Runs ONLY on v* tag pushes
  # and only after EVERY validation job above has passed on this same commit;
  # the uploaded bytes are the exact dist/first artifact the package job
  # validated. The `pypi` environment must be configured with required
  # reviewers BEFORE any v* tag is pushed (GitHub auto-creates referenced
  # environments without protection rules). The required trusted-publisher,
  # environment, immutable-tag, and default-off PYPI_PUBLISH_ENABLED setup is
  # documented in docs/releasing.md.
  #
  # Release ritual:
  #   1. Land the version bump in pyproject.toml on main.
  #   2. git tag vX.Y.Z && git push origin vX.Y.Z
  #   3. Approve the `pypi` environment deployment once this workflow's
  #      validation jobs are green.
  publish:
    name: Publish to PyPI
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      vars.PYPI_PUBLISH_ENABLED == 'true'
    needs: [static, test, sqlite-cancellation, package, dashboard]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/cayu/
    permissions:
      # Required for PyPI Trusted Publishing; no API token is used.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-dist
          path: dist/
      - uses: ./.github/actions/verify-release-tag
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  github-release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish, package]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-dist
          path: dist/
      - uses: ./.github/actions/verify-release-tag
      - name: Create release with the published artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_IS_PRERELEASE: ${{ needs.package.outputs.prerelease }}
        run: |
          release_flags=(--verify-tag)
          if test "$RELEASE_IS_PRERELEASE" = "true"; then
            release_flags+=(--prerelease --latest=false)
          fi
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "${release_flags[@]}"
