name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.11
      - run: uv sync --frozen --extra dev --extra server --extra browser --python 3.11
      - run: uv run ruff check src/ tests/ examples/ scripts/ maintenance/
      - run: uv run ruff format --check src/ tests/ examples/ scripts/ maintenance/
      - run: uv run ty check src/cayu examples maintenance
      - run: uv lock --check

  test:
    name: Test (Python 3.14)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CAYU_REQUIRE_POSTGRES: "1"
      CAYU_REQUIRE_DOCKER_RUNNER: "1"
      CAYU_REQUIRE_DOCKER_EGRESS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.14
      - run: uv sync --frozen --extra dev --extra server --python 3.14
      - name: Test
        if: github.event_name == 'pull_request'
        run: uv run pytest -q --durations=20
      - name: Test with coverage visibility
        if: github.event_name != 'pull_request'
        run: |
          uv run pytest -q \
            --durations=20 \
            --cov=cayu \
            --cov-branch \
            --cov-report=term-missing:skip-covered \
            --cov-report=markdown-append:${GITHUB_STEP_SUMMARY}

  package:
    name: Release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.11
      # PR and main CI must be deterministic. Freshness is wall-clock policy enforced by
      # scheduled maintenance and release-tag validation; this check validates the committed
      # artifact without making an unchanged branch fail as time passes.
      - run: uv run python -m maintenance.model_catalog.check --skip-staleness
      - name: Enforce freshness for release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        run: uv run python -m maintenance.model_catalog.check
      - run: uv build --out-dir dist/first
      - run: uv build --out-dir dist/second
      - name: Check reproducible archives
        run: |
          cmp dist/first/*.tar.gz dist/second/*.tar.gz
          cmp dist/first/*.whl dist/second/*.whl
      - run: uv run python scripts/check_release_artifacts.py dist/first/*
      - run: uv venv --python 3.11 .release-venv
      - run: uv pip install --python .release-venv/bin/python dist/first/*.whl
      - name: Check bundled model catalog and price book from the installed wheel
        run: |
          .release-venv/bin/python - <<'PY'
          import cayu

          catalog = cayu.default_model_catalog()
          price_book = cayu.default_price_book()
          assert cayu.__name__ == "cayu"
          assert catalog.models
          assert price_book.prices
          for model in catalog.models:
              assert catalog.match(
                  provider_name=model.provider_name,
                  model=model.model,
              ) == model
              for prefix in model.match_prefixes:
                  assert catalog.resolve(
                      provider_name=model.provider_name,
                      model=f"{prefix}fixture",
                  ) == model
          PY
      - name: Check built-wheel authoring contract
        run: |
          uv pip install --python .release-venv/bin/python pytest
          project_root="$(mktemp -d)"
          .release-venv/bin/cayu new proof --dir "$project_root"
          cd "$project_root/proof"
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" guide anatomy >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" guide authoring >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" guide tool-effects >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" inspect --json >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" check --json >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" generate slice reviewer --tool assess_submission --effect none
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" generate slice reviewer --tool assess_submission --effect none --json > repeated-plan.json
          "$GITHUB_WORKSPACE/.release-venv/bin/python" - <<'PY'
          import json
          from pathlib import Path

          repeated = json.loads(Path("repeated-plan.json").read_text())
          assert repeated["schema_version"] == "2"
          assert repeated["status"] == "already_present"
          assert repeated["edits"] == []

          agent = Path("agents/reviewer.py")
          source = agent.read_text()
          source = source.replace(
              "when it directly answers the user's request",
              "to assess the submitted proposal against the domain rubric",
          )
          agent.write_text(source)
          PY
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" inspect --agent reviewer --json > unfinished-inspect.json
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" check --json > unfinished-check.json
          "$GITHUB_WORKSPACE/.release-venv/bin/python" - <<'PY'
          import json
          from pathlib import Path

          inspect = json.loads(Path("unfinished-inspect.json").read_text())
          assert inspect["schema_version"] == "2"
          assert inspect["agents"][0]["authoring_state"] == (
              "unfinished_generated_tracer_bullet"
          )
          check = json.loads(Path("unfinished-check.json").read_text())
          assert [item["code"] for item in check["diagnostics"]] == [
              "AGENT_GENERATED_TRACER_BULLET_UNFINISHED"
          ]
          PY
          if "$GITHUB_WORKSPACE/.release-venv/bin/cayu" check --fail-on warning --json > warning-gate.json; then
            echo "unfinished generated slice unexpectedly passed the warning gate"
            exit 1
          fi
          "$GITHUB_WORKSPACE/.release-venv/bin/python" -m pytest -q
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" eval run evals.assistant:build_eval >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" eval run evals.reviewer:build_eval >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/python" - <<'PY'
          from pathlib import Path

          path = Path("agents/reviewer.py")
          source = path.read_text()
          marker = (
              "    authoring_state="
              "AgentAuthoringState.UNFINISHED_GENERATED_TRACER_BULLET,\n"
          )
          assert marker in source
          source = source.replace("AgentAuthoringState, ", "").replace(marker, "")
          source += "\n# Completed source may still mention sample, echo, or tracer bullet.\n"
          path.write_text(source)
          PY
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" check --fail-on warning --json > completed-check.json
          "$GITHUB_WORKSPACE/.release-venv/bin/python" - <<'PY'
          import json
          from pathlib import Path

          check = json.loads(Path("completed-check.json").read_text())
          assert check["diagnostics"] == []
          PY
      - run: .release-venv/bin/cayu console --help
      - name: Check optional console dependency guidance
        run: |
          if output="$(.release-venv/bin/cayu console cayu.runtime.app:CayuApp 2>&1)"; then
            echo "console unexpectedly started without the console extra"
            exit 1
          fi
          test "$output" = 'error: Cayu console requires IPython. Install it with: pip install "cayu[console]"'
      - name: Check installed CLI version
        run: |
          expected_version="$(.release-venv/bin/python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$(.release-venv/bin/cayu version)" = "cayu ${expected_version}"

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run typecheck
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.11
        working-directory: .
      - run: uv sync --frozen --extra dev --extra server --python 3.11
        working-directory: .
      - run: npm run check:api
      - run: npm run build:package
      - name: Check packaged dashboard assets
        run: |
          status="$(git -C .. status --porcelain -- src/cayu/server/dashboard)"
          if test -n "$status"; then
            echo "$status"
            git -C .. diff --stat -- src/cayu/server/dashboard
            exit 1
          fi
