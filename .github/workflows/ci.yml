name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.11
      - run: uv sync --frozen --extra dev --python 3.11
      - run: uv run ruff check src/ tests/ examples/ scripts/ maintenance/
      - run: uv run ruff format --check src/ tests/ examples/ scripts/ maintenance/

  typecheck:
    name: Type diagnostics (ty)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.11
      - run: uv sync --frozen --extra dev --extra server --python 3.11
      - run: uv run ty check src/cayu examples maintenance

  test:
    name: Test (Python 3.14)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.14
      - run: uv sync --frozen --extra dev --extra server --python 3.14
      - name: Test with coverage visibility
        run: |
          uv run pytest -q \
            --cov=cayu \
            --cov-branch \
            --cov-report=term-missing:skip-covered \
            --cov-report=markdown-append:${GITHUB_STEP_SUMMARY}
        env:
          CAYU_REQUIRE_POSTGRES: "1"

  docker-runner:
    name: Docker runner live
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uv sync --frozen --extra dev --python 3.12
      - run: uv run pytest tests/runners/test_docker_live.py -q
        env:
          CAYU_REQUIRE_DOCKER_RUNNER: "1"

  lockfile:
    name: Lockfile sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv lock --check

  package:
    name: Release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.11
      # PR and main CI must be deterministic. Freshness is wall-clock policy enforced by
      # scheduled maintenance and release-tag validation; this check validates the committed
      # artifact without making an unchanged branch fail as time passes.
      - run: uv run python -m maintenance.model_catalog.check --skip-staleness
      - name: Enforce freshness for release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        run: uv run python -m maintenance.model_catalog.check
      - run: uv build --out-dir dist/first
      - run: uv build --out-dir dist/second
      - name: Check reproducible archives
        run: |
          cmp dist/first/*.tar.gz dist/second/*.tar.gz
          cmp dist/first/*.whl dist/second/*.whl
      - run: uv run python scripts/check_release_artifacts.py dist/first/*
      - run: uv venv --python 3.11 .release-venv
      - run: uv pip install --python .release-venv/bin/python dist/first/*.whl
      - name: Check bundled model catalog from the installed wheel
        run: |
          .release-venv/bin/python - <<'PY'
          import cayu

          catalog = cayu.default_model_catalog()
          assert cayu.__name__ == "cayu"
          assert catalog.models
          assert catalog.pricing_catalog().prices
          for model in catalog.models:
              assert catalog.match(
                  provider_name=model.provider_name,
                  model=model.model,
              ) == model
              for prefix in model.match_prefixes:
                  assert catalog.resolve(
                      provider_name=model.provider_name,
                      model=f"{prefix}fixture",
                  ) == model
          PY
      - name: Check built-wheel authoring contract
        run: |
          uv pip install --python .release-venv/bin/python pytest
          project_root="$(mktemp -d)"
          .release-venv/bin/cayu new proof --dir "$project_root"
          cd "$project_root/proof"
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" guide authoring >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" inspect --json >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" check --json >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" generate slice reviewer --tool assess_submission --effect none
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" inspect --json >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" check --json >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/python" -m pytest -q
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" eval run evals.assistant:build_eval >/dev/null
          "$GITHUB_WORKSPACE/.release-venv/bin/cayu" eval run evals.reviewer:build_eval >/dev/null
      - run: .release-venv/bin/cayu console --help
      - name: Check optional console dependency guidance
        run: |
          if output="$(.release-venv/bin/cayu console cayu.runtime.app:CayuApp 2>&1)"; then
            echo "console unexpectedly started without the console extra"
            exit 1
          fi
          test "$output" = 'error: Cayu console requires IPython. Install it with: pip install "cayu[console]"'
      - name: Check installed CLI version
        run: |
          expected_version="$(.release-venv/bin/python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$(.release-venv/bin/cayu version)" = "cayu ${expected_version}"

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run typecheck
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.11
        working-directory: .
      - run: uv sync --frozen --extra dev --extra server --python 3.11
        working-directory: .
      - run: npm run check:api
      - run: npm run build:package
      - name: Check packaged dashboard assets
        run: |
          status="$(git -C .. status --porcelain -- src/cayu/server/dashboard)"
          if test -n "$status"; then
            echo "$status"
            git -C .. diff --stat -- src/cayu/server/dashboard
            exit 1
          fi
