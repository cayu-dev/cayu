[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cayu"
version = "0.1.0"
description = "A Python framework for long-running agents, multi-agent workflows, and sandboxed tool runtimes."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
  { name = "Cayu" }
]
dependencies = [
  "pydantic>=2.8",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]
server = [
  "fastapi>=0.115",
  "uvicorn>=0.30",
]
all = [
  "fastapi>=0.115",
  "uvicorn>=0.30",
]

[project.scripts]
cayu = "cayu.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.hatch.build.targets.wheel]
packages = ["src/cayu"]
