[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cayu"
version = "0.1.0"
description = "A Python framework for long-running agents, multi-agent workflows, and sandboxed tool runtimes."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
  { name = "Cayu" }
]
dependencies = [
  "certifi>=2024.0",
  "httpx>=0.27",
  "pydantic>=2.8",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "ruff>=0.11",
  "ty>=0.0.1a8",
]
server = [
  "fastapi>=0.115",
  "uvicorn>=0.30",
]
all = [
  "fastapi>=0.115",
  "uvicorn>=0.30",
]

[project.scripts]
cayu = "cayu.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
target-version = "py311"
src = ["src", "tests", "examples"]
line-length = 100

[tool.ruff.lint]
select = [
  "E",     # pycodestyle errors
  "W",     # pycodestyle warnings
  "F",     # pyflakes
  "I",     # isort
  "UP",    # pyupgrade
  "B",     # flake8-bugbear
  "SIM",   # flake8-simplify
  "TCH",   # flake8-type-checking
  "RUF",   # ruff-specific
]
ignore = [
  "E501",   # line length (handled by formatter)
  "TC001",  # move app import into TYPE_CHECKING (breaks pydantic)
  "TC003",  # move stdlib import into TYPE_CHECKING (breaks pydantic)
  "RUF012", # mutable class attrs (intentional in test fixtures)
  "RUF043", # regex metachar in pytest match= (intentional)
  "B017",   # blind Exception in tests (testing frozen attrs)
]

[tool.ruff.lint.isort]
known-first-party = ["cayu"]

[tool.ty.environment]
python-version = "3.11"
extra-paths = ["src"]

[tool.hatch.build.targets.wheel]
packages = ["src/cayu"]
